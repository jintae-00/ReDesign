# ============================================================
# 별도 설치 필요 (conda env create 후 수동 실행):
# ============================================================
#
# 1. PyTorch nightly (pytorch-triton, nvidia-* 패키지 자동 포함)
#    pip install --pre torch torchaudio torchvision --index-url https://download.pytorch.org/whl/nightly/cu129
#
# 2. PaddlePaddle GPU (PyPI에 없음, 공식 저장소 사용)
#    pip install paddlepaddle-gpu==3.0.0 -i https://www.paddlepaddle.org.cn/packages/stable/cu126/
#
# 3. SAM 2 (PyPI에 없음, GitHub에서 설치)
#    pip install git+https://github.com/facebookresearch/sam2.git
# ============================================================